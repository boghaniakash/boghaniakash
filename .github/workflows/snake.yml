# ─────────────────────────────────────────────────────────────
#  🐍 Snake Animation Workflow
#
#  One-time setup (~2 minutes):
#  1. In your `boghaniakash/boghaniakash` repo, create the folder
#     .github/workflows/  and save this file inside it as snake.yml
#  2. Open the repo's  Actions  tab → "Generate Snake Animation"
#     → click "Run workflow" once.
#
#  After the first run it regenerates automatically every day,
#  and the <picture> block in README.md starts displaying it.
# ─────────────────────────────────────────────────────────────

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # regenerate daily at midnight UTC
  workflow_dispatch:       # allow manual runs from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
